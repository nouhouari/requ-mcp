services:
  postgres:
    image: postgres:16-alpine
    container_name: requ-mcp-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: requ
      POSTGRES_PASSWORD: requ
      POSTGRES_DB: requ
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requ -d requ"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
